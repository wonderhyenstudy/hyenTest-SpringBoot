<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
<div layout:fragment="content">

    <div class="row content">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    Board Read
                </div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <span class="input-group-text">Bno:</span>
                        <input class="form-control" type="text" name="bno"
                               th:value="${dto.bno}"
                               readonly>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text">Title:</span>
                        <input class="form-control" type="text" name="title"
                               th:value="${dto.title}"
                               placeholder="board 제목을 입력해주세요" readonly>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text">Content:</span>
                        <textarea class="form-control col-sm-5" rows="5" name="content"
                                  th:text="${dto.content}"
                                  readonly>
                        </textarea>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text"> Writer:  </span>
                        <input class="form-control" type="text"
                               th:value="${dto.writer}"
                               name="writer" readonly>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text"> RegDate:  </span>
                        <input class="form-control" type="text"
                               th:value="${#temporals.format(dto.regDate,'yyyy-MM-dd HH:mm:ss')}"
                               name="regDate" readonly>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text"> ModDate:  </span>
                        <input class="form-control" type="text"
                               th:value="${#temporals.format(dto.modDate,'yyyy-MM-dd HH:mm:ss')}"
                               name="modDate" readonly>
                    </div>

                    <div th:with="link=${pageRequestDTO.getLink()}">
                        <a th:href="|@{/board/list}?${link}|" class="text-decoration-none">
                            <button class="btn btn-primary">목록가기</button>
                        </a>
                        <a th:href="|@{/board/modify}?bno=${dto.bno}&${link}|" class="text-decoration-none">
                            <button class="btn btn-secondary">수정하기</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <!--        row 끝나는 부분-->
    </div>

    <!--    댓글 입력 버튼, 입력창, -->
    <!--    1)댓글의 목록, 2)댓글 추가 버튼 , 3)페이징 번호 화면 작업-->
    <div class="row mt-3">
        <!--        부트 스트랩에서, 전체 가로 영역을 12 등분으로 나눔.-->
        <!--        col-md-12 : 전체를 차지-->
        <div class="col-md-12">
            <!--            2)댓글 추가 버튼 : addReplyBtn -->
            <div class="my-4">
                <button class="btn btn-info addReplyBtn">댓글 등록</button>
            </div>
            <!--    댓글의 목록,-->
            <!--            1)댓글의 목록 : replyList -->
            <ul class="list-group replyList">
                <!-- li  태그를 innerHTML 를 이용해서, 요소를 추가할 예정, 자바스크립트 문법으로-->
            </ul>
            <!--    댓글의 목록,-->
        </div>
    </div>
    <!--    댓글 입력 버튼, 입력창, -->


    <!--    댓글의 페이지 네이션 작업-->
    <!--        댓글의 페이지 번호 출력-->
    <div class="row mt-3">
        <div class="col">
            <div class="paging-container">
                <ul class="pagination replyPaging">

                </ul>
            </div>
        </div>
    </div>

    <!--    댓글의 페이지 네이션 작업-->

    <!--    댓글 등록 모달창1-->
    <div class="modal fade registerModal" tabindex="-1"
         aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">댓글 등록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!--                    댓글 등록 입력폼 추가하기-->
                    <div class="input-group mb-3">
                        <span class="input-group-text">내용</span>
                        <input type="text" class="form-control replyText">
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text">작성자</span>
                        <input type="text" class="form-control replyer">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary registerCloseBtn" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary registerBtn">댓글 등록</button>
                </div>
            </div>
        </div>
    </div>
    <!--    댓글 등록 모달창1-->


    <!--   댓글 수정 모달창2-->
    <div class="modal fade modifyModal" tabindex="-1"
         aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <!--                    제목 부분이 수정이 되거나, 상세보기등 제목을 동적으로 사용할 예정. -->
                    <h5 class="modal-title replyHeader"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!--                    댓글 등록 입력폼 추가하기-->
                    <div class="input-group mb-3">
                        <span class="input-group-text">내용</span>
                        <input type="text" class="form-control modifyText">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info modifyBtn">댓글 수정</button>
                    <button type="button" class="btn btn-danger removeBtn">댓글 삭제</button>
                    <button type="button" class="btn btn-secondary modifyCloseBtn" data-bs-dismiss="modal">취소</button>
                </div>
            </div>
        </div>
    </div>
    <!--    댓글 수정 모달창2-->


    <!--    axios 설치 cdn 링크 추가-->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!--수동으로 우리가 만들어서 사용할 js 추가 -->
    <script src="/js/reply.js"></script>


</div>

<!--우리는 타임리프의 베이스 레이아웃 개념을 이용하고 있고,-->
<!--여기 html 화면에서 사용할 자바스크립트는 여기 영역에 작업을 합니다.-->
<script layout:fragment="script" th:inline="javascript">
    // 화면에서, 상세보기 화면으로 갔을 경우, 해당 게시글 번호 bno를 알고 있음.
    // 왜? 서버로부터 데이터를 전달 받았음.
    // 어디서 확인, 컨틀로러에서, BoardController
    // read 메서드에서, 모델로 라벨이름 : dto , 내용물: BoardDTO 가 들어있다.
    const bno = [[${dto.bno}]]
    // reply.js 에 있는 get1 함수를 호출.
    // get1(bno)
    // console.log(get1(bno))

    // Promise : 진동벨이라고 비유했고, 서버로 부터 댓글 데이터를 받아오면, 마치 동기적인 작업처럼 진행 가능.
    // 서버로부터 정상 응답 받으면, then 절이 동작.
    // 실패하면, catch 절이 받아서 동작.

    // 함수 호출 테스트
    // get1(bno).then(data => {
    //     console.log(data)
    // }).catch(e => {
    //     console.error(e)
    // })

    // 준비물, page, size, goLast 매개변수로 받는 함수를 작성.
    // 내용에는, reply.js 에서, 만든 getList 호출해서,
    // 정상적으로 응답 : .then(data => {
    // 정상적으로 응답 못받음 : .catch(e => {
    // 함수 정의
    function printReplies(page,size,goLast) {
        getList({bno, page, size,goLast})
            .then(data => {
                // console.log(data)
                printList(data.dtoList) // 댓글 목록 출력하기.
                printPages(data)// 댓글 페이징 출력하기.
            })
            .catch(e => {console.error(e)})
    }
    // 함수 호출(사용하기), 댓글 목록을 받아서, 일단 콘솔로 확인.
    printReplies(1,10,true)

    // 작업2
    // 화면에, innerHTML 이용해서, 동적으로 HTML  요소를 그리기.
    const replyList = document.querySelector('.replyList') // 댓글목록이 출력이 되는 DOM 요소
    const replyPaging = document.querySelector('.replyPaging') // 댓글의 페이지번호(페이지네이션)이 출력이 되는 DOM 요소

    // <li 태그를 생성해서, 주입 해주는 함수를 만들기.
    function printList(dtoList) {// 준비물: 댓글의 목록 데이터가 필요함 :
        // <li 태그를 문자열처럼 작성해서, 자바스크립트로 만들고, 그 후에 태그에 추가할 예정.
        let str = '';
        //댓글 목록의 데이터 존재 여부 : 기본 유효성 체크.  -> 없는데 그림 그리기 시도하면 오류가 남.
        if(dtoList && dtoList.length >0 ) {
            for (const dto of dtoList) { // 향상된 for 문, 목록에서, 요소를 하나씩 꺼내서, 전체 순회작업하기.
                str += `
                <li class="list-group-item d-flex replyItem">
                  <span class="col-2">${dto.rno}</span>
                  <span class="col-6" data-rno="${dto.rno}">${dto.replyText}</span>
                  <span class="col-2">${dto.replyer}</span>
                  <span class="col-2">${dto.regDate}</span>
                </li>
                `
            }
        }
        //위에서 만든, html 내용을, 위의 돔 요소에 주입하기.
        replyList.innerHTML = str
    }

    // 작업3, 댓글의 페이지네이션 화면 작업,
    // innerHTML 이용해서, 태그를 문자열로 작업 후, 해당 DOM 요소에, <li 태그를 넣는 방식
    // 나중에 배울게 될 리액트에서, 화면 그리는 것과 비슷한 효과.

    function printPages(data) { // 페이지 목록 출력 준비물.
        let pageStr = ''; // 페이지네이션의 요소인 <li 태그들이 들어가 임시 문자열

        // 이전 페이지 여부
        if(data.prev) {
            pageStr += `
            <li class="page-item">
                <a class="page-link" data-page="${data.start - 1}">
                    PREV
                </a>
            </li>
            `
        }

        // 페이지번호를 출력하는 반복문
        for(let i = data.start; i <= data.end; i++) {
            pageStr += `
              <li class="page-item ${i == data.page ? "active" : ""}">
                <a class="page-link" data-page="${i}">
                 ${i}
                </a>
              </li>
            `
        }

        // 다음 페이지 번호를 , 다음시간에
        if(data.next) {
            pageStr += `
            <li class="page-item">
                <a class="page-link" data-page="${data.end + 1}">
                    NEXT
                </a>
            </li>
            `
        }

        // innerHTML , 요소 주입하기.
        replyPaging.innerHTML = pageStr

    }


    // 댓글 등록 모달 작업.
    const registerModal = new bootstrap.Modal(document.querySelector(".registerModal"))

    // 댓글 등록하는 화면에서, 1)등록 버튼, 2)댓글 내용 입력 부분, 3)작성자 부분, 4)닫는 부분을 요소로 가져오기.
    const registerBtn = document.querySelector(".registerBtn")
    const replyText = document.querySelector(".replyText")
    const replyer = document.querySelector(".replyer")
    const registerCloseBtn = document.querySelector(".registerCloseBtn")

    // 댓글 등록 클릭시, 댓글 입력 모달창 화면에 띄우기
    document.querySelector(".addReplyBtn").addEventListener("click", function (e) {
        registerModal.show()
    }, false)

    registerCloseBtn.addEventListener("click", function (e) {
        registerModal.hide()
    }, false)


    // 실제 댓글 입력 모달 창 화면에서, 댓글등록 버튼 클릭시, 이벤트 리스너 추가하기.
    registerBtn.addEventListener("click", function (e) {
        // 클릭시, 댓글의 내용을 , 자바스크립트 객체 데이터 담기 -> axios 이용해서, json 문자열로 스프링부트 서버에 전달. (역직렬화)
        // 스프링 부트 서버에서는 ->json 문자열을 받아서, -> DTO 클래스 타입으로 변환 (직렬화)
        const replyObj = {
            bno:bno,
            replyText : replyText.value,
            replyer : replyer.value
        }
        console.log("replyObj : ", replyObj)
        // reply.js 에서 만든, addReply 함수 이용하기.
        addReply(replyObj).then(result => {
            // 오타수정
            alert("등록한 댓글 번호 : " + result.rno)
            registerModal.hide()
            replyText.value = ''
            replyer.value = ''
            // 댓글 작성 후, 댓글의 마지막 페이지 이동.
            printReplies(1,10,true)
        })
            .catch(e => {
                alert("예외 발생함.")
            })
    },false)


    //댓글의 페이지네이션 번호를 클릭시, 해당 댓글 목록으로 이동하기.
    let page = 1
    let size = 10
    // 댓글의 페이지네이션 ul 태그 하위의 li 태그 하위에 a 태그의 이벤트 처리 작업 진행.
    replyPaging.addEventListener("click", function (e) {
        e.preventDefault()
        e.stopPropagation()
        // 클릭 요소의 타겟을 지정, 우리는 a 태그를 선택하는게 목적.
        const target = e.target
        if(!target || target.tagName != 'A' ){
            // 클릭한 요소가 a  태그가 아니면, 이벤트 동작을 안하겠다.
            return
        }
        // a 태그를 선택 했을 경우,
        const pageNum = target.getAttribute("data-page")
        // 기존 page 1, 클릭한  page 번호로 교체.
        page = pageNum
        // 해당 page 번호로 댓글 목록을 출력.
        printReplies(page,size)
    })


    // 댓글 수정 관련 이벤트 리스너, 요소 준비물 작업.
    // 댓글 수정 모달 작업.
    const modifyModal = new bootstrap.Modal(document.querySelector(".modifyModal"))

    // 댓글 수정하는 화면에서,
    // 1)헤더 부분 , 2)댓글 내용 입력 부분, 3)수정 버튼 , 4)삭제 버튼  5) 닫는 부분을
    // 요소로 가져오기.
    const replyHeader = document.querySelector(".replyHeader")
    const modifyText = document.querySelector(".modifyText")
    const modifyBtn = document.querySelector(".modifyBtn")
    const removeBtn = document.querySelector(".removeBtn")
    const modifyCloseBtn = document.querySelector(".modifyCloseBtn")

    // 특정 댓글을 클릭시, 모달 수정창이 출력 되게 작업.
    // 댓글 목록의 태그 : <ul> -> <li> -> <span> 태그의
    // data-rno 속성의 댓글번호를 가져와서, 서버에 호출해서, 댓글 하나조회 작업
    replyList.addEventListener("click", function (e) {
        e.preventDefault()
        e.stopPropagation()

        // 클릭 요소를 확인하고,
        const target = e.target
        // 클릭된 요소 중에서, 우리는 span  태그만 클릭시 이벤트 처리를 하겠다.
        if(!target || target.tagName != 'SPAN') {
            return
        }
        // span 태그를 클릭을 했다면,
        // data-rno 속성의 댓글번호를 가져와서
        const rno = target.getAttribute("data-rno")
        if(!rno) { // 댓글 번호가 없으면, 이벤트 처리 안하겠다.
            return;
        }

        // 댓글 번호 rno가 있다면.
        // 댓글의 내용을 모달창에 채워서, 화면 출력.
        // reply.js 에 함수가 있는데, 댓글을 하나조회하는 함수. Promise 기반
        getReply(rno).then(reply => { // 서보로부터 정상 응답 받은 데이터 : reply  담기.
            console.log(reply)
            replyHeader.innerHTML = reply.rno
            modifyText.value = reply.replyText
            modifyModal.show()
        }).catch(e => alert("오류 발생"))
    },false)

    // 댓글 수정 버튼 클릭시, 변경되 댓글의 내용을 서버에 전달하기.
    modifyBtn.addEventListener("click", function () {

        // 변경된, 댓글의 내용을, 자바스크립트 객체에 담기
        const replyObj = {
            bno:bno, // 부모 게시글의 내용은 전역 변수로 이용중.
            rno:replyHeader.innerHTML, // 헤더에 있는 댓글의 번호를 가져오기
            replyText:modifyText.value
        }

        // reply.js 에서 만든 수정하는 함수 이용.
        // modifyReply 이용하기.
        modifyReply(replyObj)
            .then(result => {
                // 수정 성공하면, 수정된 댓글의 번호를 받아옴, 그래서, result , 댓글번호가 있음.
                alert(result.rno+ ' 댓글이 수정되었습니다.')
                replyText.value = ''
                modifyModal.hide()
                printReplies(page,size,true) // 수정후, 댓글의 마지막페이지로 이동 가능.
            })
            .catch(e => {
                console.log("댓글 수정 실패")
            })
    },false)

    // 취소 버튼으로, 모달창 숨기기.
    modifyCloseBtn.addEventListener("click", function (e) {
        modifyModal.hide()
    },false)


    // 삭제 버튼 클릭시 이벤트 처리
    removeBtn.addEventListener("click", function (e) {
        // 모달창 헤더에 있는 댓글의 rno 번호를 가져와서, 삭제함수에 인자값으로 대입하기.
        removeReply(replyHeader.innerHTML)
            .then(result => {
                alert(result.rno + ' 댓글이 삭제되었습니다.')
                replyText.value = ''
                modifyModal.hide()

                // 삭제 후, 첫페이지 , 마지막 페이지로 갈지 정하면 됩니다.
                // 안전하게, 삭제 후, 1페이지로 이동하기.
                page = 1
                printReplies(page,size)
            })
            .catch(e => {
                console.log("댓글 삭제 실패")
            })
    },false)

</script>
</body>
</html>
